name: sim-validate

# Validation-only workflow (NOT part of the PR). Runs the MetaDrive sim test
# N times in parallel on the free ubuntu-24.04 runner to measure reliability.

on:
  workflow_dispatch:
    inputs:
      count:
        description: 'number of parallel attempts'
        default: '20'
        required: true
        type: string

concurrency:
  group: sim-validate-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: 1
  PYTHONPATH: ${{ github.workspace }}

jobs:
  gen-matrix:
    name: build matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          n='${{ github.event.inputs.count }}'
          echo "matrix=$(python3 -c "import json,sys; print(json.dumps(list(range(1,int('$n')+1))))")" >> "$GITHUB_OUTPUT"

  sim:
    name: sim attempt ${{ matrix.run }}
    needs: gen-matrix
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        run: ${{ fromJSON(needs.gen-matrix.outputs.matrix) }}
    env:
      LOG_ROOT: ${{ github.workspace }}/sim_logs
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - run: ./tools/op.sh setup
      - name: Cache scons build
        uses: actions/cache@v4
        with:
          path: /tmp/scons_cache
          key: scons-sim-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            scons-sim-${{ runner.os }}-
      - name: Build openpilot
        run: scons
      - name: Driving test
        timeout-minutes: 10
        run: |
          source selfdrive/test/setup_xvfb.sh
          pytest -s -p no:xdist tools/sim/tests/test_metadrive_bridge.py
      - name: DIAG where did logs go
        if: always()
        run: |
          echo "== LOG_ROOT=$LOG_ROOT =="
          ls -la "$LOG_ROOT" 2>/dev/null || echo "LOG_ROOT missing"
          echo "== files under LOG_ROOT =="
          find "$LOG_ROOT" -type f 2>/dev/null | head -80 || true
          echo "== files under ~/.comma =="
          find "$HOME/.comma" -type f 2>/dev/null | head -80 || true
          echo "== any qlog/rlog/hevc/ts anywhere in work dir =="
          find "$GITHUB_WORKSPACE" "$HOME" -type f \( -name 'qlog*' -o -name 'rlog*' -o -name '*.hevc' -o -name 'qcamera*' \) 2>/dev/null | head -80 || true
          echo "== manager.log: loggerd/encoderd/errors =="
          grep -iE "loggerd|encoderd|logger|started|stopped|exit|error|traceback|crash|killed" /tmp/manager.log 2>/dev/null | tail -80 || echo "no manager.log"
          echo "== manager.log tail =="
          tail -50 /tmp/manager.log 2>/dev/null || true
      - name: Upload logs (qlog, rlog, camera)
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: sim-logs-attempt-${{ matrix.run }}
          path: ${{ github.workspace }}/sim_logs
          if-no-files-found: warn
